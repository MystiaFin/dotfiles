# Kitty Terminal Configuration
# Save this as ~/.config/kitty/kitty.conf
#
background_opacity 0.92
allow_remote_control yes

# Font Configuration
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font
italic_font      JetBrainsMono Nerd Font
bold_italic_font JetBrainsMono Nerd Font
font_size 13.0
font_size 13.0

# Cursor Configuration
cursor_shape block
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval 0
cursor_stop_blinking_after 15.0
cursor_trail 3
cursor_trail_decay 0.1 0.5

# Force cursor shape (some shells override this)
shell_integration no-cursor

# Performance and misc settings
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Window settings
remember_window_size yes
initial_window_width 100c
initial_window_height 30c
window_padding_width 8

# Scrollback
scrollback_lines 10000

# Mouse
copy_on_select yes
strip_trailing_spaces smart

# Performance
sync_to_monitor yes
