# Foot Terminal Configuration
# Save this as ~/.config/foot/foot.ini

[main]
# Font Configuration
font=JetBrainsMono Nerd Font:size=13

# Window settings
pad=8x8
initial-window-size-chars=100x30

[scrollback]
lines=10000

[bell]
urgent=no
notify=no

[cursor]
# Cursor Configuration
style=block
blink=no

[colors-dark]
# Background opacity
alpha=0.92

# Background and foreground
background=11111b
foreground=cdd6f4

# Cursor colors: <text-color> <cursor-background-color>
cursor=1e1e2e f5e0dc

# Selection colors
selection-background=585b70
selection-foreground=cdd6f4

# URL underline color
urls=89b4fa

# Normal colors
regular0=45475a  # black
regular1=f38ba8  # red
regular2=a6e3a1  # green
regular3=f9e2af  # yellow
regular4=89b4fa  # blue
regular5=f5c2e7  # magenta
regular6=94e2d5  # cyan
regular7=bac2de  # white

# Bright colors
bright0=585b70   # bright black
bright1=f38ba8   # bright red
bright2=a6e3a1   # bright green
bright3=f9e2af   # bright yellow
bright4=89b4fa   # bright blue
bright5=f5c2e7   # bright magenta
bright6=94e2d5   # bright cyan
bright7=a6adc8   # bright white

[mouse]
# Mouse
hide-when-typing=yes
